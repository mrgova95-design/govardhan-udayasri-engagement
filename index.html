    <style>
        :root {
            --gold-primary: #FBBF24;
            --gold-light: #FEF3C7;
            --text-main: #FFFFFF;
            --maroon-deep: #4a0404;
            --maroon-mid: #7a0d0d;
            --ruby-red: #9e1414;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--maroon-deep);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: hidden;
            height: 100vh;
        }

        #mute-btn {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(251, 191, 36, 0.2); border: 1px solid var(--gold-primary);
            color: var(--gold-primary); width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        #mute-btn:hover { background: var(--gold-primary); color: var(--maroon-deep); }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0 C55 20 80 45 100 50 C80 55 55 80 50 100 C45 80 20 55 0 50 C20 45 45 20 50 0 Z" fill="rgba(251, 191, 36, 0.04)"/></svg>');
            background-size: 150px 150px; z-index: -6;
        }

        #slideshow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; opacity: 0;
            animation: kenBurnsFade 30s infinite linear;
        }

        .slide:nth-child(1) { background-image: url('fg1.jpg'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('fg2.jpg'); animation-delay: 6s; }
        .slide:nth-child(3) { background-image: url('fg3.jpg'); animation-delay: 12s; }
        .slide:nth-child(4) { background-image: url('fg4.jpg'); animation-delay: 18s; }
        .slide:nth-child(5) { background-image: url('fg5.jpg'); animation-delay: 24s; }

        @keyframes kenBurnsFade {
            0% { opacity: 0; transform: scale(1); }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(122, 13, 13, 0.6) 0%, rgba(74, 4, 4, 0.95) 100%); z-index: -4; }

        #welcome-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: linear-gradient(rgba(74, 4, 4, 0.85), rgba(74, 4, 4, 0.85)), url('welcome_bg.jpg');
            background-size: cover; background-position: center;
            backdrop-filter: blur(5px); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 20px; z-index: 1000; transition: opacity 1.5s ease; 
        }

        .welcome-rings { position: relative; width: 150px; height: 80px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; }
        .w-ring-groom { position: absolute; width: 50px; height: 50px; border: 5px solid var(--gold-primary); border-radius: 50%; left: 20px; box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 12px rgba(251, 191, 36, 0.4); animation: wMoveGroom 4s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .w-ring-bride { position: absolute; width: 50px; height: 50px; border: 5px solid var(--gold-primary); border-radius: 50%; right: 20px; box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 12px rgba(251, 191, 36, 0.4); animation: wMoveBride 4s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .w-diamond { position: absolute; top: -10px; left: 16px; width: 15px; height: 15px; background: linear-gradient(135deg, #FFF 0%, #E2E8F0 100%); clip-path: polygon(50% 0%, 100% 30%, 50% 100%, 0% 30%); filter: drop-shadow(0 0 8px #FFF); }
        .w-sparkle { position: absolute; color: #FFF; font-size: 2.5rem; opacity: 0; z-index: 5; animation: wSparkleAnim 4s infinite cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes wMoveGroom { 0%, 15% { transform: translateX(-20px); opacity: 0; } 35%, 75% { transform: translateX(20px); opacity: 1; } 90%, 100% { transform: translateX(-20px); opacity: 0; } }
        @keyframes wMoveBride { 0%, 15% { transform: translateX(20px); opacity: 0; } 35%, 75% { transform: translateX(-20px); opacity: 1; } 90%, 100% { transform: translateX(20px); opacity: 0; } }
        @keyframes wSparkleAnim { 0%, 35% { transform: scale(0) rotate(0deg); opacity: 0; } 42% { transform: scale(1.2) rotate(45deg); opacity: 1; text-shadow: 0 0 20px #FFF; } 65% { transform: scale(1) rotate(90deg); opacity: 0.8; } 80%, 100% { transform: scale(0) rotate(180deg); opacity: 0; } }

        .welcome-text { font-family: 'Montserrat', sans-serif; color: var(--gold-light); font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; line-height: 1.6; }
        .welcome-names { font-family: 'Alex Brush', cursive; color: var(--gold-primary); font-size: 4rem; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .heart-icon { font-family: Arial, sans-serif; color: #ff3333; font-size: 2.5rem; animation: blinkHeart 1.5s infinite; text-shadow: 0 0 15px rgba(251, 191, 36, 0.8); }
        @keyframes blinkHeart { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } }

        .tap-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold-primary); color: var(--gold-primary); padding: 15px 45px; font-size: 1rem; font-family: 'Montserrat', sans-serif; letter-spacing: 3px; text-transform: uppercase; border-radius: 50px; cursor: pointer; transition: all 0.4s ease; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); backdrop-filter: blur(5px); }
        .tap-btn:hover { background: var(--gold-primary); color: var(--maroon-deep); box-shadow: 0 0 40px rgba(251, 191, 36, 0.6); transform: scale(1.05); }

        #invite-content { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 5vh 20px; position: relative; z-index: 10; }
        .glass-panel { position: relative; background-color: rgba(74, 4, 4, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(251, 191, 36, 0.4); border-radius: 20px; padding: 50px 30px; max-width: 700px; width: 100%; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); overflow: hidden; z-index: 1; }
        .glass-panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('doodle_bg.png'); background-size: cover; background-position: center; opacity: 0.2; z-index: -1; }

        .reveal { opacity: 0; transform: translateY(20px); animation: revealSoft 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .delay-1 { animation-delay: 0.3s; } .delay-2 { animation-delay: 0.7s; } .delay-3 { animation-delay: 1.1s; } .delay-4 { animation-delay: 1.5s; }
        @keyframes revealSoft { to { opacity: 1; transform: translateY(0); } }

        .om-symbol { width: 45px; fill: var(--gold-primary); margin-bottom: 15px; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5)); animation: pulse 3s infinite alternate; }
        .event-type { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; letter-spacing: 5px; color: var(--gold-light); text-transform: uppercase; margin-bottom: 15px; }
        .name { font-family: 'Alex Brush', cursive; font-size: 5rem; color: var(--gold-primary); text-shadow: 2px 2px 10px rgba(0,0,0,0.8); line-height: 1.1; }
        .weds { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; letter-spacing: 6px; color: var(--gold-light); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .weds::before, .weds::after { content: ''; height: 1px; width: 40px; background: linear-gradient(90deg, transparent, var(--gold-primary), transparent); }
        .countdown-container { display: flex; justify-content: center; gap: 15px; margin: 35px 0; }
        .time-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 8px; padding: 15px; min-width: 80px; }
        .time-box span { display: block; font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; color: var(--gold-primary); }
        .time-box p { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold-light); margin-top: 5px; }
        .detail-group { margin-bottom: 30px; }
        .detail-title { display: inline-block; font-family: 'Montserrat', sans-serif; color: var(--gold-primary); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; padding: 8px 25px; border: 1px solid rgba(251, 191, 36, 0.6); border-radius: 50px; background: rgba(251, 191, 36, 0.1); margin-bottom: 12px; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
        .detail-title::before { content: '✨ '; margin-right: 5px; } .detail-title::after { content: ' ✨'; margin-left: 5px; }
        .detail-text { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; line-height: 1.5; color: #eaeaea; margin-top: 5px; }
        .map-btn { display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; padding: 10px 30px; background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary); text-decoration: none; border-radius: 30px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; transition: all 0.3s ease; }
        .map-btn:hover { background: rgba(251, 191, 36, 0.1); transform: translateY(-3px); }

        @media (max-width: 600px) {
            .glass-panel { padding: 40px 15px; } .name { font-size: 3.8rem; }
            .welcome-names { flex-direction: column; gap: 5px; font-size: 4rem; }
            .countdown-container { gap: 10px; margin: 25px 0; }
        }
    </style>
</head>

    <script>
        function openInvite() {
            const screen = document.getElementById('welcome-screen');
            const content = document.getElementById('invite-content');
            const music = document.getElementById('bgMusic');
            const muteBtn = document.getElementById('mute-btn');
            music.play().catch(e => console.log("Audio play prevented:", e));
            screen.style.opacity = '0';
            setTimeout(() => { document.body.style.overflowY = 'auto'; screen.style.display = 'none'; content.style.display = 'flex'; muteBtn.style.display = 'flex'; }, 1000);
        }
        function toggleMute() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('mute-btn');
            music.muted = !music.muted;
            btn.innerText = music.muted ? '🔇' : '🔊';
        }
        const targetDate = new Date("July 9, 2026 09:30:00").getTime();
        let switched=false;
        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            let distance = targetDate - now;

            if(distance < 0){
                distance = now - targetDate;
                if(!switched){
                    document.getElementById("countdown").insertAdjacentHTML(
                        "beforebegin",
                        "<div style='margin-bottom:18px;text-align:center;'><div class='detail-title'>💍 Two Hearts. One Promise. Forever Begins Here.</div><div class='detail-text'>We've Been Happily Engaged For</div></div>"
                    );
                    switched=true;
                }
            }

            const days = Math.floor(distance / (1000*60*60*24));
            const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
            const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
            const seconds = Math.floor((distance % (1000*60))/1000);

            document.getElementById("days").innerText = String(days).padStart(2,'0');
            document.getElementById("hours").innerText = String(hours).padStart(2,'0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2,'0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2,'0');
        },1000);
    </script>
